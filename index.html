<!DOCTYPE html>
<html lang="uk">

    <head>
        <meta charset="UTF-8">
        <title>Knapsack Solver</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <div class="container">
            <h1>Задача «Рюкзак»</h1>
            <div class="tabs">
                <button class="tab active" data-tab="brute">Brute Force</button>
                <button class="tab" data-tab="recursive">Recursive</button>
                <button class="tab" data-tab="dp">Dynamic Programming</button>
                <button class="tab" data-tab="greedy">Greedy</button>
                <button class="tab" data-tab="branch">Branch & Bound</button>
            </div>

            <div class="grid-layout">
                <div class="input-section">

                    <div class="card">
                        <label>Максимальна вага (W)</label>
                        <input type="number" id="capacity" value="12">
                    </div>

                    <div class="card">
                        <label>Предмети (вага, цінність)</label>
                        <textarea id="items-data">1,2
2,4
3,5
2,3
2,7
1,6</textarea>
                    </div>

                    <button id="start-btn">Запустити</button>

                    <button id="pause-btn">⏸ Пауза</button>
                    <button id="resume-btn">▶ Продовжити</button>


                    <label>Швидкість анімації</label>
                    <select id="speed">
                        <option value="1">1x (звичайна)</option>
                        <option value="2">2x</option>
                        <option value="3">3x</option>
                        <option value="4">4x</option>
                    </select>


                </div>

                <div class="table-container">
                    <div id="results-area">
                        <div class="placeholder">
                            Оберіть алгоритм і натисніть "Запустити"
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>

</html>
